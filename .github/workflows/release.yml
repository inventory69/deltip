name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact-name: linux
          - os: windows-latest
            artifact-name: windows

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Linux packaging tools
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y fakeroot rpm

      - name: Run tests
        run: ./gradlew :composeApp:allTests --stacktrace

      - name: Build native distribution
        run: ./gradlew :composeApp:packageDistributionForCurrentOS --stacktrace

      - name: List build outputs
        shell: bash
        run: ls -la composeApp/build/compose/binaries/main/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deltip-${{ matrix.artifact-name }}
          path: |
            composeApp/build/compose/binaries/main/deb/*.deb
            composeApp/build/compose/binaries/main/rpm/*.rpm
            composeApp/build/compose/binaries/main/exe/*.exe
            composeApp/build/compose/binaries/main/msi/*.msi
          if-no-files-found: ignore

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew :composeApp:allTests --stacktrace

      - name: Build signed release APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :composeApp:assembleRelease --stacktrace

      - name: Rename APK to include version
        run: |
          set -e
          cd composeApp/build/outputs/apk/release
          APK=$(ls *.apk | head -n1)
          VERSION="${GITHUB_REF_NAME#v}"
          cp "$APK" "deltip-${VERSION}.apk"
          ls -la

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: deltip-android
          path: composeApp/build/outputs/apk/release/deltip-*.apk
          if-no-files-found: error

  release:
    needs: [build-desktop, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact directory
        run: |
          mkdir -p release
          find artifacts -type f \
            \( -name "*.deb" -o -name "*.rpm" \
               -o -name "*.exe" -o -name "*.msi" \
               -o -name "*.apk" \) \
            -exec mv {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false

  # Veröffentlicht das Update-Manifest auf GitHub Pages direkt im selben Run.
  # Nötig, weil ein vom GITHUB_TOKEN erstelltes Release KEINE Folge-Workflows
  # triggert (GitHub-Schutz gegen Workflow-Rekursion) — der `release:`-Trigger
  # von deploy-pages.yml würde also nie feuern. Logik gespiegelt aus
  # deploy-pages.yml (das bleibt für manuellen Backfill via workflow_dispatch).
  deploy-pages:
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Build latest.json
        run: |
          set -e
          # Tag (z. B. v0.4.0) → Version ohne führendes v.
          VERSION="${GITHUB_REF_NAME#v}"
          test -n "$VERSION"
          mkdir -p site
          cat > site/latest.json <<EOF
          {
            "version": "${VERSION}",
            "exeUrl": "https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/Deltip-${VERSION}.exe"
          }
          EOF
          cat site/latest.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
