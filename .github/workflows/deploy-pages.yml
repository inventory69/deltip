name: Deploy Pages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without leading v, e.g. 0.3.0)'
        required: true
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Build latest.json
        run: |
          set -e
          # Version aus Release-Tag (führendes v strippen) bzw. dispatch-Input.
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          if [ -z "$VERSION" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          test -n "$VERSION"
          mkdir -p site
          # Asset-URL folgt der stabilen jpackage-Namenskonvention Deltip-<version>.exe.
          cat > site/latest.json <<EOF
          {
            "version": "${VERSION}",
            "exeUrl": "https://github.com/inventory69/deltip/releases/download/v${VERSION}/Deltip-${VERSION}.exe"
          }
          EOF
          cat site/latest.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
