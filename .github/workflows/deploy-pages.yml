# Manueller Backfill / Re-Deploy des Update-Manifests auf GitHub Pages.
# Der reguläre Auto-Publish bei jedem Release läuft im `deploy-pages`-Job von
# release.yml (ein vom GITHUB_TOKEN erstelltes Release triggert keine
# Folge-Workflows, ein `release:`-Trigger würde hier also nie feuern).
# Dieser Workflow dient nur dazu, das Manifest für eine beliebige bestehende
# Version von Hand neu zu setzen.
name: Deploy Pages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without leading v, e.g. 0.4.0)'
        required: true
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Build latest.json
        run: |
          set -e
          # Dispatch-Input (führendes v defensiv strippen).
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION#v}"
          test -n "$VERSION"
          mkdir -p site
          # Asset-URL folgt der stabilen jpackage-Namenskonvention Deltip-<version>.exe.
          cat > site/latest.json <<EOF
          {
            "version": "${VERSION}",
            "exeUrl": "https://github.com/inventory69/deltip/releases/download/v${VERSION}/Deltip-${VERSION}.exe"
          }
          EOF
          cat site/latest.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
